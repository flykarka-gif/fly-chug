<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>עדכון קבוצות — Fly</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Heebo', sans-serif; background: #FFF5F7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; direction: rtl; }
  .box { background: white; border-radius: 20px; padding: 36px; max-width: 520px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; }
  .logo { font-size: 48px; font-weight: 900; color: #E8193C; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #6B7280; margin-bottom: 28px; }
  .btn { padding: 14px 32px; border-radius: 12px; border: none; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-bottom: 10px; }
  .btn-primary { background: #E8193C; color: white; }
  .btn-primary:disabled { background: #9CA3AF; cursor: not-allowed; }
  .progress { background: #F3F4F6; border-radius: 99px; height: 12px; overflow: hidden; margin: 16px 0; display: none; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #E8193C, #F5C518); border-radius: 99px; transition: width 0.3s; width: 0%; }
  .status { font-size: 14px; color: #6B7280; min-height: 24px; }
  .success { color: #22C55E; font-weight: 700; font-size: 18px; }
  .link { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #F3F4F6; border-radius: 10px; font-weight: 700; text-decoration: none; color: #1A1A2E; font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">✈️ Fly</div>
  <div class="sub">עדכון קבוצות לפי גיל אמיתי</div>
  <div style="background:#FEF9C3;border-radius:12px;padding:16px;margin-bottom:24px;font-size:13px;text-align:right;line-height:1.8;">
    <strong>קבוצה א</strong> — גילאי 4.5–10 (₪190/חודש)<br>
    <strong>קבוצה ב</strong> — גילאי 11–13 (₪190/חודש)<br>
    <strong>קבוצה ג</strong> — גילאי 14–23 (₪250/חודש)
  </div>
  <button class="btn btn-primary" id="updateBtn" onclick="startUpdate()">🔄 עדכן קבוצות לכל התלמידות</button>
  <div class="progress" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="status" id="status"></div>
  <a href="https://flykarka-gif.github.io/fly-chug" class="link" id="goBtn" style="display:none;">← חזרי למערכת</a>
</div>

<script>
const SUPABASE_URL = 'https://mcbnwncrqyhsekbezbmx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_CVEfhJ3ngh7qk1hd6O4xyQ_MCByVbvE';

function getGroup(age) {
  if (!age || age <= 10) return 'קבוצה א (4.5–10)';
  if (age <= 13) return 'קבוצה ב (11–13)';
  return 'קבוצה ג (14–23)';
}

async function startUpdate() {
  const btn = document.getElementById('updateBtn');
  btn.disabled = true;
  btn.textContent = 'מעדכן...';
  document.getElementById('progressWrap').style.display = 'block';

  // Get all students
  const res = await fetch(`${SUPABASE_URL}/rest/v1/students?select=id,age,first,last`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const students = await res.json();
  
  let success = 0;
  for (let i = 0; i < students.length; i++) {
    const s = students[i];
    const group = getGroup(s.age);
    document.getElementById('status').textContent = `מעדכן: ${s.first} ${s.last} → ${group}`;
    document.getElementById('progressBar').style.width = `${Math.round((i+1)/students.length*100)}%`;
    
    // Special cases
    let discount = 'none';
    let discountCustom = 0;
    const fullName = s.first + ' ' + s.last;
    if (fullName.includes('הורביץ') || fullName.includes('גרוס')) {
      discount = 'custom';
      discountCustom = 210;
    }

    await fetch(`${SUPABASE_URL}/rest/v1/students?id=eq.${s.id}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ student_group: group, discount, discount_custom: discountCustom })
    });
    success++;
    await new Promise(r => setTimeout(r, 60));
  }

  document.getElementById('status').innerHTML = `<span class="success">✓ ${success} תלמידות עודכנו!</span>`;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('goBtn').style.display = 'inline-block';
  btn.textContent = '✓ הושלם!';
}
</script>
</body>
</html>

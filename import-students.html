async function startImport() {
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = 'מייבא...';
  document.getElementById('progressWrap').style.display = 'block';
  
  let success = 0;
  let failed = 0;

  for (let i = 0; i < students.length; i++) {
    const s = students[i];
    document.getElementById('status').textContent = `מוסיפה: ${s.first} ${s.last} (${i+1}/${students.length})`;
    document.getElementById('progressBar').style.width = `${Math.round((i+1)/students.length*100)}%`;

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/students`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(s)
      });
      if (res.ok) success++;
      else failed++;
    } catch(e) {
      failed++;
    }
    await new Promise(r => setTimeout(r, 80));
  }

  document.getElementById('status').innerHTML = `<span class="success">✓ ${success} תלמידות נוספו בהצלחה!</span>${failed > 0 ? `<br><span class="error">${failed} נכשלו</span>` : ''}`;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('goBtn').style.display = 'inline-block';
  btn.textContent = '✓ הייבוא הושלם!';
}
